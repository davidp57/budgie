name: Docker

"on":
  push:
    branches: [main, develop]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve branch context
        id: context
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            BRANCH=$(git branch -r --contains "$GITHUB_SHA" \
              | grep -E 'origin/(main|develop)' \
              | head -1 \
              | sed 's|[[:space:]]*origin/||')
            echo "is_tag=true" >> "$GITHUB_OUTPUT"
            echo "branch=${BRANCH:-main}" >> "$GITHUB_OUTPUT"
          else
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
            echo "branch=${GITHUB_REF#refs/heads/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=develop-latest,enable=${{ steps.context.outputs.is_tag == 'false' && steps.context.outputs.branch == 'develop' }}
            type=raw,value=latest,enable=${{ steps.context.outputs.is_tag == 'false' && steps.context.outputs.branch == 'main' }}
            type=semver,pattern=develop-{{version}},enable=${{ steps.context.outputs.is_tag == 'true' && steps.context.outputs.branch == 'develop' }}
            type=semver,pattern={{version}},enable=${{ steps.context.outputs.is_tag == 'true' && steps.context.outputs.branch == 'main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Smoke test
        run: |
          IMAGE=$(echo "${{ steps.meta.outputs.tags }}" | head -1)
          docker pull "$IMAGE"
          # Health check endpoint responds
          docker run -d --name budgie-test -p 18000:8000 \
            -e SECRET_KEY=ci-test-key \
            -e DATABASE_URL=sqlite+aiosqlite:////app/data/budgie.db \
            "$IMAGE"
          # Wait up to 30 s for the server to be ready (migrations can take a while)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:18000/api/health 2>/dev/null | grep -q '"ok"'; then
              echo "Health check passed after ${i}s"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "Health check timed out — container logs:"
              docker logs budgie-test
              docker stop budgie-test || true
              exit 1
            fi
            sleep 1
          done
          docker stop budgie-test
