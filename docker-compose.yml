services:
  budgie:
    build: .
    container_name: budgie
    restart: unless-stopped
    ports:
      - "8080:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    # Optional: set PUID/PGID to match host user (important on Synology NAS)
    # environment:
    #   - PUID=1026
    #   - PGID=100
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
